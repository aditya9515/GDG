runConfig:
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_API_BASE_URL
    value: "__SET_API_BASE_URL__"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_ENABLE_DEMO_AUTH
    value: "false"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "__SET_FIREBASE_API_KEY__"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "__SET_FIREBASE_APP_ID__"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "__SET_FIREBASE_AUTH_DOMAIN__"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "__SET_FIREBASE_PROJECT_ID__"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "__SET_FIREBASE_STORAGE_BUCKET__"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: "__SET_GOOGLE_MAPS_JS_API_KEY__"
    availability: [BUILD, RUNTIME]
